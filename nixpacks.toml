[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["npm install -g pnpm@10 --ignore-scripts"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps /app/artifacts/api-server/dist/index.mjs"
